server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

execution:
  mode: ${EXECUTION_MODE:aws}
  sam:
    endpoint: ${EXECUTION_SAM_ENDPOINT:http://127.0.0.1:3001}
  aws:
    region: ${EXECUTION_AWS_REGION}
    profile: ${EXECUTION_AWS_PROFILE:}
  lambda:
    javascript: ${EXECUTION_LAMBDA_JS}
    python: ${EXECUTION_LAMBDA_PYTHON}
    java: ${EXECUTION_LAMBDA_JAVA}
  default-timeout-ms: ${EXECUTION_TIMEOUT_MS:5000}
