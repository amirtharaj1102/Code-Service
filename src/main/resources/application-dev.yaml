server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coderank_code
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: 9a4f2c8d3e7b1a5f6c8d9e0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c

execution:
  mode: sam-local
  sam:
    endpoint: http://127.0.0.1:3001
  aws:
    region: ap-south-1
    profile: coderank
  lambda:
    javascript: coderank-exec-js
    python: coderank-exec-python
    java: coderank-exec-java
  default-timeout-ms: 5000
